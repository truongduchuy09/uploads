<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Henrry</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-10 text-center">Bộ Sưu Tập Ảnh & Video</h1>
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>

    <script>
        // Thay bằng link raw của file data.json trên Repo của bạn
        const DATA_URL = "data.json"; 

        async function loadGallery() {
            const res = await fetch(DATA_URL + '?t=' + Date.now()); // Tránh bị lưu cache
            const data = await res.json();
            const gallery = document.getElementById('gallery');
            
            data.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-2 rounded-xl shadow";
                div.innerHTML = item.type === 'image' 
                    ? `<img src="${item.url}" class="w-full h-48 object-cover rounded-lg">`
                    : `<video src="${item.url}" controls class="w-full h-48 object-cover rounded-lg"></video>`;
                gallery.appendChild(div);
            });
        }
        loadGallery();
    </script>
</body>
</html>
